<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventoX — Mercado de Predicciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #1a1a24;
            --border: #2a2a38;
            --accent: #e8ff47;
            --accent2: #ff4747;
            --accent3: #47b4ff;
            --text: #f0f0f5;
            --muted: #6b6b85;
            --yes: #47ff8a;
            --no: #ff4747;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NOISE TEXTURE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* HEADER */
        header {
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
            color: var(--accent);
        }

        .logo span {
            color: var(--text);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .credits-display {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .credits-amount {
            color: var(--accent);
            font-weight: 500;
        }

        .btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--text);
            border-color: var(--text);
            color: var(--bg);
        }

        /* TICKER */
        .ticker {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 0;
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-inner {
            display: inline-flex;
            gap: 3rem;
            animation: ticker 30s linear infinite;
        }

        .ticker-item {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .ticker-item .label { color: var(--text); }
        .ticker-item .yes-val { color: var(--yes); }
        .ticker-item .no-val { color: var(--no); }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* MAIN LAYOUT */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* HERO */
        .hero {
            margin-bottom: 3rem;
            padding: 3rem 0 2rem;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 2rem;
        }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .hero h1 .highlight {
            color: var(--accent);
            display: block;
        }

        .hero p {
            margin-top: 1rem;
            color: var(--muted);
            font-size: 0.95rem;
            max-width: 500px;
            line-height: 1.6;
        }

        .stats-row {
            display: flex;
            gap: 2rem;
            text-align: right;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        /* SECTION */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--accent);
        }

        /* MARKETS GRID */
        .markets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .market-card {
            background: var(--bg);
            padding: 1.5rem;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
            overflow: hidden;
        }

        .market-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.2s;
        }

        .market-card:hover {
            background: var(--bg2);
        }

        .market-card:hover::after {
            transform: scaleX(1);
        }

        .market-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            background: rgba(232,255,71,0.08);
            padding: 0.2rem 0.5rem;
            display: inline-block;
            margin-bottom: 0.75rem;
        }

        .market-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 1.25rem;
            color: var(--text);
        }

        /* PRICE BAR */
        .price-bar-container {
            margin-bottom: 1rem;
        }

        .price-bar {
            height: 4px;
            background: var(--bg3);
            margin-bottom: 0.5rem;
            position: relative;
        }

        .price-bar-fill {
            height: 100%;
            background: var(--yes);
            transition: width 0.5s ease;
        }

        .price-labels {
            display: flex;
            justify-content: space-between;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
        }

        .yes-label { color: var(--yes); }
        .no-label { color: var(--no); }

        /* MARKET FOOTER */
        .market-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
        }

        .market-meta {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .bet-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-yes {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--yes);
            background: transparent;
            color: var(--yes);
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-yes:hover {
            background: var(--yes);
            color: var(--bg);
        }

        .btn-no {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--no);
            background: transparent;
            color: var(--no);
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-no:hover {
            background: var(--no);
            color: var(--bg);
        }

        /* EMPTY STATE */
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .empty-state h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--muted);
        }

        .empty-state p {
            font-size: 0.85rem;
            color: var(--muted);
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 480px;
            padding: 2rem;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.2rem;
            font-family: 'IBM Plex Mono', monospace;
        }

        .modal-close:hover { color: var(--text); }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.65rem 0.75rem;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        /* BET MODAL */
        .bet-modal-market {
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .bet-position-select {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .position-btn {
            padding: 1rem;
            border: 2px solid var(--border);
            background: transparent;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            text-align: left;
        }

        .position-btn .pos-label {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .position-btn .pos-price {
            font-size: 0.75rem;
        }

        .position-btn.yes-btn {
            color: var(--yes);
            border-color: var(--yes);
        }

        .position-btn.yes-btn.selected,
        .position-btn.yes-btn:hover {
            background: var(--yes);
            color: var(--bg);
        }

        .position-btn.no-btn {
            color: var(--no);
            border-color: var(--no);
        }

        .position-btn.no-btn.selected,
        .position-btn.no-btn:hover {
            background: var(--no);
            color: var(--bg);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 1rem 1.5rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            z-index: 300;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 300px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: var(--no);
        }

        /* LOADING */
        .loading {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            animation: pulse 1s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* RESOLVED BADGE */
        .resolved-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            padding: 0.15rem 0.4rem;
            background: rgba(107,107,133,0.2);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* CATEGORY FILTER */
        .filter-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 600px) {
            .hero { grid-template-columns: 1fr; }
            .stats-row { text-align: left; }
            main { padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">Evento<span>X</span></div>
    <div class="header-right">
        <div class="credits-display">
            CRÉDITOS: <span class="credits-amount" id="userCredits">1,000</span>
        </div>
        <button class="btn btn-primary" onclick="openNewMarketModal()">+ NUEVO MERCADO</button>
    </div>
</header>

<!-- TICKER -->
<div class="ticker">
    <div class="ticker-inner" id="ticker">
        <span class="ticker-item"><span class="label">CARGANDO MERCADOS...</span></span>
        <span class="ticker-item"><span class="label">CARGANDO MERCADOS...</span></span>
    </div>
</div>

<!-- MAIN -->
<main>
    <div class="hero">
        <div>
            <h1>Predice el futuro<span class="highlight">de Colombia.</span></h1>
            <p>Mercados de predicción binarios sobre política, economía y eventos colombianos. Resueltos con datos oficiales del gobierno.</p>
        </div>
        <div class="stats-row">
            <div class="stat">
                <span class="stat-value" id="totalMarkets">0</span>
                <span class="stat-label">Mercados</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="totalBets">0</span>
                <span class="stat-label">Posiciones</span>
            </div>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">Mercados Activos</div>
    </div>

    <div class="filter-row">
        <button class="filter-btn active" onclick="filterMarkets('all', this)">Todos</button>
        <button class="filter-btn" onclick="filterMarkets('política', this)">Política</button>
        <button class="filter-btn" onclick="filterMarkets('economía', this)">Economía</button>
        <button class="filter-btn" onclick="filterMarkets('crimen', this)">Seguridad</button>
    </div>

    <div id="marketsContainer">
        <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>
</main>

<!-- NEW MARKET MODAL -->
<div class="modal-overlay" id="newMarketModal">
    <div class="modal">
        <div class="modal-title">
            Crear Nuevo Mercado
            <button class="modal-close" onclick="closeModal('newMarketModal')">✕</button>
        </div>
        <div class="form-group">
            <label class="form-label">Pregunta del Contrato *</label>
            <input class="form-input" id="eventTitle" placeholder="¿Ganará Petro las elecciones de 2026?" />
        </div>
        <div class="form-group">
            <label class="form-label">Descripción</label>
            <input class="form-input" id="eventDesc" placeholder="Contexto adicional del contrato..." />
        </div>
        <div class="form-group">
            <label class="form-label">Fecha de Cierre *</label>
            <input class="form-input" type="datetime-local" id="eventCloseTime" />
        </div>
        <div class="form-group">
            <label class="form-label">Fuente de Resolución</label>
            <input class="form-input" id="eventSource" placeholder="Registraduría, DANE, Fiscalía..." />
        </div>
        <div class="modal-actions">
            <button class="btn" onclick="closeModal('newMarketModal')">Cancelar</button>
            <button class="btn btn-primary" onclick="createMarket()">Crear Mercado</button>
        </div>
    </div>
</div>

<!-- BET MODAL -->
<div class="modal-overlay" id="betModal">
    <div class="modal">
        <div class="modal-title">
            Tomar Posición
            <button class="modal-close" onclick="closeModal('betModal')">✕</button>
        </div>
        <div class="bet-modal-market" id="betModalTitle"></div>
        <div class="bet-position-select">
            <button class="position-btn yes-btn" id="yesBtnSelect" onclick="selectPosition('YES')">
                <span class="pos-label">SÍ</span>
                <span class="pos-price" id="yesPriceDisplay">50 créditos</span>
            </button>
            <button class="position-btn no-btn" id="noBtnSelect" onclick="selectPosition('NO')">
                <span class="pos-label">NO</span>
                <span class="pos-price" id="noPriceDisplay">50 créditos</span>
            </button>
        </div>
        <div class="form-group">
            <label class="form-label">Cantidad (créditos)</label>
            <input class="form-input" type="number" id="betAmount" value="50" min="1" max="1000" />
        </div>
        <div class="modal-actions">
            <button class="btn" onclick="closeModal('betModal')">Cancelar</button>
            <button class="btn btn-primary" onclick="placeBet()">Confirmar Posición</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    const API = 'http://localhost:3000';
    let allEvents = [];
    let selectedEventId = null;
    let selectedPosition = null;
    let currentFilter = 'all';
    const USER_ID = 1; // temporary until auth

    // FETCH EVENTS
    async function loadEvents() {
        try {
            const res = await fetch(`${API}/events`);
            allEvents = await res.json();
            renderMarkets(allEvents);
            updateStats(allEvents);
            updateTicker(allEvents);
        } catch (err) {
            document.getElementById('marketsContainer').innerHTML = `
                <div class="empty-state">
                    <h3>Error conectando al servidor</h3>
                    <p>Asegúrate de que el servidor esté corriendo en puerto 3000</p>
                </div>`;
        }
    }

    function updateStats(events) {
        document.getElementById('totalMarkets').textContent = events.length;
    }

    function updateTicker(events) {
        if (events.length === 0) return;
        const tickerEl = document.getElementById('ticker');
        const items = [...events, ...events].map(e => `
            <span class="ticker-item">
                <span class="label">${e.title.substring(0, 50)}${e.title.length > 50 ? '...' : ''}</span>
                <span class="yes-val">SÍ ${e.yes_price}¢</span>
                <span class="no-val">NO ${e.no_price}¢</span>
            </span>
        `).join('');
        tickerEl.innerHTML = items;
    }

    function renderMarkets(events) {
        const container = document.getElementById('marketsContainer');
        if (events.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h3>No hay mercados activos</h3>
                    <p>Crea el primer contrato de predicción para Colombia</p>
                </div>`;
            return;
        }

        const cards = events.map(event => {
            const yesWidth = event.yes_price || 50;
            const closeDate = new Date(event.close_time).toLocaleDateString('es-CO', {
                day: 'numeric', month: 'short', year: 'numeric'
            });

            return `
                <div class="market-card">
                    <div class="market-tag">${event.resolution_source || 'Contrato Binario'}</div>
                    <div class="market-title">${event.title}</div>
                    <div class="price-bar-container">
                        <div class="price-bar">
                            <div class="price-bar-fill" style="width: ${yesWidth}%"></div>
                        </div>
                        <div class="price-labels">
                            <span class="yes-label">SÍ ${event.yes_price || 50}¢</span>
                            <span class="no-label">NO ${event.no_price || 50}¢</span>
                        </div>
                    </div>
                    <div class="market-footer">
                        <div class="market-meta">
                            <span>Cierre: ${closeDate}</span>
                            <span>${event.resolved ? '✓ Resuelto' : 'Activo'}</span>
                        </div>
                        <div class="bet-buttons">
                            <button class="btn-yes" onclick="openBetModal(${event.id}, 'YES')">SÍ</button>
                            <button class="btn-no" onclick="openBetModal(${event.id}, 'NO')">NO</button>
                        </div>
                    </div>
                </div>`;
        }).join('');

        container.innerHTML = `<div class="markets-grid">${cards}</div>`;
    }

    // FILTER
    function filterMarkets(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (filter === 'all') {
            renderMarkets(allEvents);
        } else {
            const filtered = allEvents.filter(e =>
                e.title.toLowerCase().includes(filter) ||
                (e.description && e.description.toLowerCase().includes(filter)) ||
                (e.resolution_source && e.resolution_source.toLowerCase().includes(filter))
            );
            renderMarkets(filtered);
        }
    }

    // CREATE MARKET
    async function createMarket() {
        const title = document.getElementById('eventTitle').value.trim();
        const description = document.getElementById('eventDesc').value.trim();
        const closeTime = document.getElementById('eventCloseTime').value;
        const resolutionSource = document.getElementById('eventSource').value.trim();

        if (!title || !closeTime) {
            showToast('Título y fecha de cierre son requeridos', true);
            return;
        }

        try {
            const res = await fetch(`${API}/events`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, closeTime, resolutionSource })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            closeModal('newMarketModal');
            showToast('¡Mercado creado exitosamente!');
            loadEvents();

            // clear form
            ['eventTitle','eventDesc','eventCloseTime','eventSource'].forEach(id => {
                document.getElementById(id).value = '';
            });
        } catch (err) {
            showToast('Error creando el mercado', true);
        }
    }

    // BET MODAL
    function openBetModal(eventId, position) {
        const event = allEvents.find(e => e.id === eventId);
        if (!event) return;

        selectedEventId = eventId;
        selectedPosition = position;

        document.getElementById('betModalTitle').textContent = event.title;
        document.getElementById('yesPriceDisplay').textContent = `${event.yes_price || 50} créditos`;
        document.getElementById('noPriceDisplay').textContent = `${event.no_price || 50} créditos`;

        selectPosition(position);
        document.getElementById('betModal').classList.add('active');
    }

    function selectPosition(pos) {
        selectedPosition = pos;
        document.getElementById('yesBtnSelect').classList.toggle('selected', pos === 'YES');
        document.getElementById('noBtnSelect').classList.toggle('selected', pos === 'NO');
    }

    // PLACE BET
    async function placeBet() {
        const amount = parseInt(document.getElementById('betAmount').value);
        if (!selectedPosition || !amount || amount < 1) {
            showToast('Selecciona una posición y cantidad válida', true);
            return;
        }

        try {
            const res = await fetch(`${API}/bets`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: USER_ID,
                    eventId: selectedEventId,
                    position: selectedPosition,
                    amount
                })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            closeModal('betModal');
            showToast(`Posición ${selectedPosition} tomada por ${amount} créditos`);

            // update credits display
            const current = parseInt(document.getElementById('userCredits').textContent.replace(',',''));
            document.getElementById('userCredits').textContent = (current - amount).toLocaleString();
        } catch (err) {
            showToast('Error procesando la posición', true);
        }
    }

    // MODALS
    function openNewMarketModal() {
        document.getElementById('newMarketModal').classList.add('active');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('active');
        });
    });

    // TOAST
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast${isError ? ' error' : ''} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // INIT
    loadEvents();
    setInterval(loadEvents, 30000); // refresh every 30s
</script>
</body>
</html>
